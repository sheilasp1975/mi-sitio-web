<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Cultural La Libertad</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'EB Garamond', serif; background: #fdf6ee; min-height: 100vh; }
    .wrapper { display: flex; height: 100vh; overflow: hidden; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 230px; min-width: 230px;
      background: linear-gradient(175deg, #3d1c02 0%, #6b3a1f 60%, #8b5635 100%);
      display: flex; flex-direction: column;
      box-shadow: 4px 0 28px rgba(61,28,2,0.3);
      position: relative; z-index: 10;
    }
    .sidebar-header {
      padding: 28px 20px 20px; text-align: center;
      border-bottom: 1px solid rgba(255,220,140,0.2);
    }
    .logo-icon { font-size: 44px; display: block; margin-bottom: 6px; }
    .sidebar-title { font-family: 'Cinzel', serif; color: #ffdc8c; font-size: 13px; letter-spacing: 1px; line-height: 1.4; }
    .sidebar-sub { color: rgba(255,220,140,0.5); font-size: 10px; letter-spacing: 2px; margin-top: 5px; text-transform: uppercase; }
    .nav { padding: 18px 12px; flex: 1; }
    .nav-label { color: rgba(255,220,140,0.35); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin: 14px 8px 8px; font-family: 'EB Garamond', serif; }
    .nav a {
      display: flex; align-items: center; gap: 12px;
      color: rgba(255,220,140,0.85); text-decoration: none;
      font-family: 'EB Garamond', serif; font-size: 16px; font-weight: 500;
      padding: 11px 13px; border-radius: 8px; margin-bottom: 3px;
      transition: all 0.22s; border: 1px solid transparent;
    }
    .nav a:hover { background: rgba(255,220,140,0.1); color: #ffdc8c; border-color: rgba(255,220,140,0.2); transform: translateX(4px); }
    .nav a .icon { font-size: 19px; width: 25px; text-align: center; }
    .sep { border: none; border-top: 1px solid rgba(255,220,140,0.15); margin: 10px 12px; }
    .sidebar-footer { padding: 14px 18px; border-top: 1px solid rgba(255,220,140,0.12); color: rgba(255,220,140,0.3); font-size: 12px; text-align: center; }

    /* ── CONTENT ── */
    .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .top-bar {
      background: linear-gradient(90deg, #3d1c02, #6b3a1f);
      padding: 14px 28px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 3px 14px rgba(61,28,2,0.25);
    }
    .top-bar h1 { font-family: 'Cinzel', serif; font-size: 16px; color: #ffdc8c; letter-spacing: 1.5px; }
    .top-bar .badge { background: rgba(255,220,140,0.15); color: #ffdc8c; padding: 5px 14px; border-radius: 3px; font-size: 12px; font-family: 'Cinzel', serif; letter-spacing: 1px; border: 1px solid rgba(255,220,140,0.2); }
    iframe { flex: 1; border: none; background: #fdf6ee; }
  </style>
</head>
<body>
  <div class="wrapper">
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="logo-icon">🏺</span>
        <div class="sidebar-title">Portal Cultural<br>La Libertad</div>
        <div class="sidebar-sub">Herencia & Cultura</div>
      </div>
      <nav class="nav">
        <div class="nav-label">Categorías</div>
        <a href="historia.html" target="contenido"><span class="icon">📜</span> Historia</a>
        <a href="museos.html" target="contenido"><span class="icon">🏛️</span> Museos</a>
        <hr class="sep">
        <a href="festivales.html" target="contenido"><span class="icon">🎭</span> Festivales</a>
        <a href="artesania.html" target="contenido"><span class="icon">🪡</span> Artesanía</a>
      </nav>
      <div class="sidebar-footer">© 2025 Portal Cultural</div>
    </aside>
    <div class="content">
      <div class="top-bar">
        <h1>✦ PATRIMONIO CULTURAL ✦</h1>
        <span class="badge">Trujillo, Perú</span>
      </div>
      <iframe name="contenido" src="historia.html"></iframe>
    </div>
  </div>
</body>
</html>
